name: Publish to Terraform Registry

on:
  push:
    branches:
      - master
    paths:
      - '**/CHANGELOG.md'
  workflow_dispatch:
    inputs:
      module_path:
        description: 'Module path to publish (e.g., aws/acm)'
        required: true
        type: string

permissions:
  contents: 'write'
  id-token: 'write'

jobs:
  detect-changes:
    name: Detect Changed Modules
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        if: github.event_name == 'push'
        run: |
          CHANGED_FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.event.after }} | grep "CHANGELOG.md$" || true)
          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Process changes
        id: set-matrix
        run: |
          # Function to extract latest version from CHANGELOG
          extract_version() {
            local changelog_file="$1"
            grep -oE '^## \[v?[0-9]+\.[0-9]+\.[0-9]+\]' "$changelog_file" | head -1 | sed 's/^## \[//;s/\]//'
          }

          # Function to check if version is unreleased
          is_unreleased() {
            local changelog_file="$1"
            local version="$2"
            grep -A 1 "## \[$version\]" "$changelog_file" | grep -q "Unreleased"
            return $?
          }

          # Initialize modules array
          MODULES=()

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # Manual trigger - read version from CHANGELOG.md
            MODULE_PATH="${{ github.event.inputs.module_path }}"
            CHANGELOG_PATH="${MODULE_PATH}/CHANGELOG.md"
          
            if [[ ! -f "$CHANGELOG_PATH" ]]; then
              echo "Error: CHANGELOG.md not found in ${MODULE_PATH}"
              exit 1
            fi
          
            VERSION=$(extract_version "$CHANGELOG_PATH")
            if [[ -z "$VERSION" ]]; then
              echo "Error: No version found in ${CHANGELOG_PATH}"
              exit 1
            fi
          
            if ! is_unreleased "$CHANGELOG_PATH" "$VERSION"; then
              MODULES+=("{\"path\":\"$MODULE_PATH\",\"version\":\"$VERSION\"}")
            else
              echo "Latest version is marked as Unreleased"
              exit 1
            fi
          else
            # Process changed files from push event
            while IFS= read -r file; do
              [ -z "$file" ] && continue
          
              MODULE_PATH=$(dirname "$file")
              VERSION=$(extract_version "$file")
          
              if [[ -n "$VERSION" ]] && ! is_unreleased "$file" "$VERSION"; then
                MODULES+=("{\"path\":\"$MODULE_PATH\",\"version\":\"$VERSION\"}")
              fi
            done <<< "${{ steps.changed-files.outputs.changed_files }}"
          fi

          # Create JSON matrix
          JSON_ARRAY=$(IFS=,; echo "{\"include\":[${MODULES[*]}]}")
          echo "matrix=$JSON_ARRAY" >> $GITHUB_OUTPUT
          echo "Generated matrix: $JSON_ARRAY"

  validate:
    needs: detect-changes
    if: needs.detect-changes.outputs.matrix != '{\"include\":[]}'
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{fromJson(needs.detect-changes.outputs.matrix)}}
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Validate module files
        working-directory: ${{ matrix.path }}
        run: |
          # Check required files
          required_files=("main.tf" "variables.tf" "outputs.tf" "README.md" "versions.tf")
          for file in "${required_files[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "Error: Required file $file is missing"
              exit 1
            fi
          done
          
          # Initialize and validate Terraform
          terraform init
          terraform validate

  publish:
    needs: [ detect-changes, validate ]
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{fromJson(needs.detect-changes.outputs.matrix)}}
      fail-fast: false

    steps:
      - name: Create GitHub App Token
        uses: actions/create-github-app-token@v2
        id: github-app-token
        with:
          app-id: ${{ vars.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ steps.github-app-token.outputs.token }}
          ref: ${{ github.head_ref }}
          # Make sure the value of GITHUB_TOKEN will not be persisted in repo's config
          persist-credentials: false

      - name: Package and publish module
        env:
          TF_TOKEN: ${{ secrets.TF_TOKEN }}
          TF_ORGANIZATION: ${{ secrets.TF_ORGANIZATION }}
          TF_REGISTRY: ${{ secrets.TF_REGISTRY_HOST }}
        run: |
          VERSION="${{ matrix.version }}"
          MODULE_PATH="${{ matrix.path }}"
          
          # Create a temporary directory for the module
          TEMP_DIR=$(mktemp -d)
          MODULE_NAME="terraform-$(echo "$MODULE_PATH" | tr '/' '-')"
          PROVIDER="aws"  # or determine dynamically based on your structure

          # Create GitHub Release if it doesn't exist
          OWNER=$(echo "$GITHUB_REPOSITORY" | cut -d '/' -f 1)
          REPO=$(echo "$GITHUB_REPOSITORY" | cut -d '/' -f 2)

          # Check if release exists
          RELEASE_CHECK=$(curl \
            --silent \
            --header "Authorization: Bearer ${GITHUB_TOKEN}" \
            --write-out "%{http_code}" \
            --output /dev/null \
            "https://api.github.com/repos/${OWNER}/${REPO}/releases/tags/v${VERSION}")
          
          if [ "$RELEASE_CHECK" -eq "404" ]; then
            echo "Creating GitHub release v${VERSION}..."
          
            # Create release
            CREATE_RELEASE=$(curl \
              --fail \
              --header "Authorization: Bearer ${GITHUB_TOKEN}" \
              --header "Content-Type: application/json" \
              --request POST \
              --data "{
                \"tag_name\": \"v${VERSION}\",
                \"name\": \"v${VERSION}\",
                \"body\": \"Release v${VERSION}\",
                \"draft\": false,
                \"prerelease\": false
              }" \
              "https://api.github.com/repos/${OWNER}/${REPO}/releases")
          
            if [ $? -ne 0 ]; then
              echo "Failed to create GitHub release:"
              echo "$CREATE_RELEASE"
              exit 1
            fi
          else
            echo "Release v${VERSION} already exists"
          fi
          
          # Step 1: Check if module exists in public registry
          echo "Checking if module exists in public registry..."
          HTTP_STATUS=$(curl \
            --silent \
            --output /dev/null \
            --write-out "%{http_code}" \
            --header "Authorization: Bearer ${TF_TOKEN}" \
            --header "Content-Type: application/vnd.api+json" \
            "https://registry.terraform.io/v2/modules/${OWNER}/${MODULE_NAME}/${PROVIDER}")
          
          # If module doesn't exist, publish it
          if [ "$HTTP_STATUS" -eq "404" ]; then
            echo "Module doesn't exist. Publishing to public registry..."
            PUBLISH_RESPONSE=$(curl \
              --fail \
              --header "Authorization: Bearer ${TF_TOKEN}" \
              --header "Content-Type: application/vnd.api+json" \
              --request POST \
              --data "{
                \"data\": {
                  \"type\": \"modules\",
                  \"attributes\": {
                    \"name\": \"${MODULE_NAME}\",
                    \"provider\": \"${PROVIDER}\",
                    \"registry-name\": \"public\",
                    \"repository\": \"https://github.com/${OWNER}/${REPO}\"
                  }
                }
              }" \
              "https://registry.terraform.io/v2/modules")
          
            if [ $? -ne 0 ]; then
              echo "Failed to publish module:"
              echo "$PUBLISH_RESPONSE"
              exit 1
            fi
          
            echo "Module published successfully"
          elif [ "$HTTP_STATUS" -eq "200" ]; then
            echo "Module already exists in public registry"
          else
            echo "Unexpected status code: $HTTP_STATUS"
            exit 1
          fi
          
          echo "Requesting module version ingestion..."
          TRIGGER_RESPONSE=$(curl \
            --fail \
            --header "Authorization: Bearer ${TF_TOKEN}" \
            --header "Content-Type: application/vnd.api+json" \
            --request POST \
            "https://registry.terraform.io/v2/modules/${OWNER}/${MODULE_NAME}/${PROVIDER}/versions")
          
          if [ $? -ne 0 ]; then
            echo "Failed to trigger version ingestion:"
            echo "$TRIGGER_RESPONSE"
            exit 1
          fi
          
          echo "Version ingestion triggered successfully"
          echo "The module version will be available once the registry processes the GitHub release"

  notify:
    needs: [ publish ]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Notify status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const success = '${{ needs.publish.result }}' === 'success';
            const message = success
              ? '✅ Module publishing completed successfully'
              : '❌ Module publishing failed';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });
