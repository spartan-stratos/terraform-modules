
name: Publish to Terraform Registry

on:
  push:
    branches:
      - master
    paths:
      - '**/CHANGELOG.md'
  workflow_dispatch:
    inputs:
      module_path:
        description: 'Module path to publish (e.g., aws/acm)'
        required: true
        type: string

permissions:
  contents: 'write'
  id-token: 'write'

jobs:
  detect-changes:
    name: Detect Changed Modules
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        if: github.event_name == 'push'
        run: |
          CHANGED_FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.event.after }} | grep "CHANGELOG.md$" || true)
          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Process changes
        id: set-matrix
        run: |
          # Function to extract latest version from CHANGELOG
          extract_version() {
            local changelog_file="$1"
            grep -oE '^## \[v?[0-9]+\.[0-9]+\.[0-9]+\]' "$changelog_file" | head -1 | sed 's/^## \[//;s/\]//'
          }

          # Function to check if version is unreleased
          is_unreleased() {
            local changelog_file="$1"
            local version="$2"
            grep -A 1 "## \[$version\]" "$changelog_file" | grep -q "Unreleased"
            return $?
          }

          # Initialize modules array
          MODULES=()

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # Manual trigger - read version from CHANGELOG.md
            MODULE_PATH="${{ github.event.inputs.module_path }}"
            CHANGELOG_PATH="${MODULE_PATH}/CHANGELOG.md"
          
            if [[ ! -f "$CHANGELOG_PATH" ]]; then
              echo "Error: CHANGELOG.md not found in ${MODULE_PATH}"
              exit 1
            fi
          
            VERSION=$(extract_version "$CHANGELOG_PATH")
            if [[ -z "$VERSION" ]]; then
              echo "Error: No version found in ${CHANGELOG_PATH}"
              exit 1
            fi
          
            if ! is_unreleased "$CHANGELOG_PATH" "$VERSION"; then
              MODULES+=("{\"path\":\"$MODULE_PATH\",\"version\":\"$VERSION\"}")
            else
              echo "Latest version is marked as Unreleased"
              exit 1
            fi
          else
            # Process changed files from push event
            while IFS= read -r file; do
              [ -z "$file" ] && continue
          
              MODULE_PATH=$(dirname "$file")
              VERSION=$(extract_version "$file")
          
              if [[ -n "$VERSION" ]] && ! is_unreleased "$file" "$VERSION"; then
                MODULES+=("{\"path\":\"$MODULE_PATH\",\"version\":\"$VERSION\"}")
              fi
            done <<< "${{ steps.changed-files.outputs.changed_files }}"
          fi

          # Create JSON matrix
          JSON_ARRAY=$(IFS=,; echo "{\"include\":[${MODULES[*]}]}")
          echo "matrix=$JSON_ARRAY" >> $GITHUB_OUTPUT
          echo "Generated matrix: $JSON_ARRAY"

  validate:
    needs: detect-changes
    if: needs.detect-changes.outputs.matrix != '{\"include\":[]}'
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{fromJson(needs.detect-changes.outputs.matrix)}}
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Validate module files
        working-directory: ${{ matrix.path }}
        run: |
          # Check required files
          required_files=("main.tf" "variables.tf" "outputs.tf" "README.md" "versions.tf")
          for file in "${required_files[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "Error: Required file $file is missing"
              exit 1
            fi
          done
          
          # Initialize and validate Terraform
          terraform init
          terraform validate

  publish:
    needs: [ detect-changes, validate ]
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{fromJson(needs.detect-changes.outputs.matrix)}}
      fail-fast: false

    steps:
      - name: Create GitHub App Token
        uses: actions/create-github-app-token@v2
        id: github-app-token
        with:
          app-id: ${{ vars.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ steps.github-app-token.outputs.token }}
          ref: ${{ github.head_ref }}
          # Make sure the value of GITHUB_TOKEN will not be persisted in repo's config
          persist-credentials: false

      - name: Package and publish module
        env:
          TF_TOKEN: ${{ secrets.TF_TOKEN }}
          TF_ORGANIZATION: ${{ secrets.TF_ORGANIZATION }}
          TF_REGISTRY: ${{ secrets.TF_REGISTRY_HOST }}
        run: |
          VERSION="${{ matrix.version }}"
          MODULE_PATH="${{ matrix.path }}"
          
          # Create a temporary directory for the module
          TEMP_DIR=$(mktemp -d)
          MODULE_NAME="terraform-$(echo "$MODULE_PATH" | tr '/' '-')"
          PROVIDER="aws"  # or determine dynamically based on your structure
          
          # Step 1: Check if module exists
          echo "Checking if module exists..."
          MODULE_CHECK=$(curl \
            --silent --show-error \
            --header "Authorization: Bearer ${TF_TOKEN}" \
            --header "Content-Type: application/vnd.api+json" \
            --write-out "%{http_code}" \
            --output /dev/null \
            "https://app.terraform.io/api/v2/organizations/${TF_ORGANIZATION}/registry-modules/private/${TF_ORGANIZATION}/${MODULE_NAME}/${PROVIDER}")
          
          # Create module if it doesn't exist (404 response)
          if [ "$MODULE_CHECK" -eq "404" ]; then
            echo "Module doesn't exist. Creating new module..."
            CREATE_RESPONSE=$(curl \
              --fail \
              --header "Authorization: Bearer ${TF_TOKEN}" \
              --header "Content-Type: application/vnd.api+json" \
              --request POST \
              --data "{
                \"data\": {
                  \"type\": \"registry-modules\",
                  \"attributes\": {
                    \"name\": \"${MODULE_NAME}\",
                    \"provider\": \"${PROVIDER}\",
                    \"registry-name\": \"private\"
                  }
                }
              }" \
              "https://app.terraform.io/api/v2/organizations/${TF_ORGANIZATION}/registry-modules")
          
            echo "Module created successfully"
          else
            echo "Module already exists"
          fi
          
          # Step 2: Create version payload
          cat > payload.json << EOF
          {
            "data": {
              "type": "registry-module-versions",
              "attributes": {
                "version": "${VERSION}"
              }
            }
          }
          EOF
          
          # Step 3: Create version in registry
          echo "Creating version ${VERSION}..."
          RESPONSE=$(curl \
            --fail \
            --header "Authorization: Bearer ${TF_TOKEN}" \
            --header "Content-Type: application/vnd.api+json" \
            --request POST \
            --data @payload.json \
            "https://app.terraform.io/api/v2/organizations/${TF_ORGANIZATION}/registry-modules/private/${TF_ORGANIZATION}/${MODULE_NAME}/${PROVIDER}/versions")
          
          # Extract upload URL
          UPLOAD_URL=$(echo "$RESPONSE" | jq -r '.data.links.upload')
          
          if [ -z "$UPLOAD_URL" ] || [ "$UPLOAD_URL" = "null" ]; then
            echo "Failed to get upload URL from response:"
            echo "$RESPONSE"
            exit 1
          fi
          
          # Step 4: Create module archive
          echo "Creating module archive..."
          cd "${MODULE_PATH}"
          tar zcvf ../module.tar.gz *
          cd ..
          
          # Step 5: Upload the module content
          echo "Uploading module content..."
          UPLOAD_RESPONSE=$(curl \
            --fail \
            --header "Authorization: Bearer ${TF_TOKEN}" \
            --header "Content-Type: application/octet-stream" \
            --request PUT \
            --data-binary @module.tar.gz \
            "${UPLOAD_URL}")
          
          echo "Module uploaded successfully"
          
          # Cleanup
          rm -f module.zip payload.json
          
          # Step 6: Verify the upload
          echo "Verifying module upload..."
          sleep 5  # Give the registry some time to process
          
          VERIFY_STATUS=$(curl \
            --silent --show-error \
            --header "Authorization: Bearer ${TF_TOKEN}" \
            --header "Content-Type: application/vnd.api+json" \
            --write-out "%{http_code}" \
            --output /dev/null \
            --request GET \
            "https://app.terraform.io/api/registry/v1/modules/${TF_ORGANIZATION}/${MODULE_NAME}/${PROVIDER}/${VERSION}")
          
          if [ "$VERIFY_STATUS" -ne "200" ]; then
            echo "Module verification failed with status code: $VERIFY_STATUS"
            exit 1
          fi
          
          echo "Module verification successful (status code: $VERIFY_STATUS)"

  notify:
    needs: [publish]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Notify status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const success = '${{ needs.publish.result }}' === 'success';
            const message = success
              ? '✅ Module publishing completed successfully'
              : '❌ Module publishing failed';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });
